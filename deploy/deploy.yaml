---

- name: Deploy bot

  become: yes
  become_user: root
  hosts: vscale_host
  tasks:
    - name: Create db folder
      ansible.builtin.file:
        path: /srv/ToxicBot/db
        state: directory

    - name: Create tracing network
      community.docker.docker_network:
        name: toxicbot-tracing
        state: present

    - name: Create and start a container
      community.docker.docker_container:
        name: "ToxicBot"
        image: "docker.io/32133789756/toxicbot:{{ DOCKER_TAG }}"
        pull: yes
        state: started
        recreate: yes
        restart_policy: always
        networks:
          - name: toxicbot-tracing
        volumes:
          - "/srv/ToxicBot/db:/toxicdb"
        env:
          TELEGRAM_TOKEN: "{{ TELEGRAM_TOKEN }}"
          IGOR_ID: "{{ IGOR_ID }}"
          MAX_ID: "{{ MAX_ID }}"
          KIRILL_ID: "{{ KIRILL_ID }}"
          STICKER_SETS: "{{ STICKER_SETS }}"
          GOOGLE_CREDENTIALS: "{{ GOOGLE_CREDENTIALS }}"
          GOOGLE_SPREADSHEET_ID: "{{ GOOGLE_SPREADSHEET_ID }}"
          DEEPSEEK_API_KEY: "{{ DEEPSEEK_API_KEY }}"
          GIGACHAT_AUTH_KEY: "{{ GIGACHAT_AUTH_KEY }}"
          BULLINGS_THRESHOLD_COUNT: "2"
          BULLINGS_THRESHOLD_TIME: "5m"
          SQLITE_FILE_PATH: "/toxicdb/sas_sqlite.db"
          TRACING_ENABLED: "{{ TRACING_ENABLED }}"
          TRACING_OTLP_ENDPOINT: "jaeger:4317"

    - name: Prune unused imagages
      community.docker.docker_prune:
        images: yes
        images_filters:
          dangling: yes
